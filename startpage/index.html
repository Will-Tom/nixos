<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Start</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 40px;
    }

    .item {
      text-align: center;
      text-decoration: none;
      color: #eee;
      font-size: 14px;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 10px;
      font-size: 28px;
    }
  </style>
</head>

<body>
  <div class="grid">
    <a class="item" href="https://idp.csu.edu.au/idp/profile/SAML2/Redirect/SSO?execution=e1s2">
      <div class="icon"><img src="https://www.google.com/s2/favicons?domain=https://www.csu.edu.au&sz=128"></div>
      Student
    </a>

    <a class="item" href="https://youtube.com">
      <div class="icon"><img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128"></div>
      YouTube
    </a>

    <a class="item" href="https://mail.google.com">
      <div class="icon"><img src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=128"></div>
      Gmail
    </a>

    <a class="item" href="https://mail.google.com/mail/u/1/#inbox">
      <div class="icon"><img src="https://www.google.com/s2/favicons?domain=mail.google.com&s=128"></div>
      Pro Mail
    </a>
  </div>
</body>

</html>
