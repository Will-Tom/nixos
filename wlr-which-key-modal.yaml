# ~/.config/wlr-which-key/modal.yaml

# Theming — fully transparent, nothing renders
font: JetBrainsMono Nerd Font 11
background: "#00000000"
color: "#00000000"
border: "#00000000"
border_width: 0
corner_r: 0
padding: 0

anchor: bottom-right
margin_right: 20
margin_bottom: 20

menu:
  # Launcher
  - { key: "space", desc: Launcher, cmd: "fuzzel" }

  # Focus — lowercase
  - { key: "h", desc: Focus left,  cmd: "niri msg action focus-column-left",  keep_open: true }
  - { key: "j", desc: Focus down,  cmd: "niri msg action focus-window-down",  keep_open: true }
  - { key: "k", desc: Focus up,    cmd: "niri msg action focus-window-up",    keep_open: true }
  - { key: "l", desc: Focus right, cmd: "niri msg action focus-column-right", keep_open: true }

  # Move — Shift+hjkl (uppercase)
  - { key: "H", desc: Move left,  cmd: "niri msg action move-column-left",  keep_open: true }
  - { key: "J", desc: Move down,  cmd: "niri msg action move-window-down",  keep_open: true }
  - { key: "K", desc: Move up,    cmd: "niri msg action move-window-up",    keep_open: true }
  - { key: "L", desc: Move right, cmd: "niri msg action move-column-right", keep_open: true }

  # Strip ends — g/; focus, G/: move
  - { key: "g", desc: First column,      cmd: "niri msg action focus-column-first",      keep_open: true }
  - { key: ";", desc: Last column,       cmd: "niri msg action focus-column-last",       keep_open: true }
  - { key: "G", desc: Move to first,     cmd: "niri msg action move-column-to-first",    keep_open: true }
  - { key: ":", desc: Move to last,      cmd: "niri msg action move-column-to-last",     keep_open: true }

  # Workspace up/down — u/d focus, U/D move
  - { key: "u", desc: Workspace up,   cmd: "niri msg action focus-workspace-up",            keep_open: true }
  - { key: "U", desc: Move ws up,     cmd: "niri msg action move-column-to-workspace-up",   keep_open: true }
  - { key: "d", desc: Workspace down, cmd: "niri msg action focus-workspace-down",          keep_open: true }
  - { key: "D", desc: Move ws down,   cmd: "niri msg action move-column-to-workspace-down", keep_open: true }

  # Monitor focus — arrows
  - { key: "Left",  desc: Monitor left,  cmd: "niri msg action focus-monitor-left",  keep_open: true }
  - { key: "Right", desc: Monitor right, cmd: "niri msg action focus-monitor-right", keep_open: true }
  - { key: "Up",    desc: Monitor up,    cmd: "niri msg action focus-monitor-up",    keep_open: true }
  - { key: "Down",  desc: Monitor down,  cmd: "niri msg action focus-monitor-down",  keep_open: true }

  # Move to monitor — submenu
  - key: "m"
    desc: Move to monitor
    submenu:
      - { key: "Left",  desc: Left,  cmd: "niri msg action move-column-to-monitor-left" }
      - { key: "Right", desc: Right, cmd: "niri msg action move-column-to-monitor-right" }
      - { key: "Up",    desc: Up,    cmd: "niri msg action move-column-to-monitor-up" }
      - { key: "Down",  desc: Down,  cmd: "niri msg action move-column-to-monitor-down" }

  # Go to
  - key: "w"
    desc: Go to
    submenu:
      - { key: "1", desc: Workspace 1, cmd: "niri msg action focus-workspace 1" }
      - { key: "2", desc: Workspace 2, cmd: "niri msg action focus-workspace 2" }
      - { key: "3", desc: Workspace 3, cmd: "niri msg action focus-workspace 3" }
      - { key: "o", desc: Overview,    cmd: "niri msg action toggle-overview" }

  # Resize
  - key: "r"
    desc: Resize
    submenu:
      - { key: "1", desc: Full width,   cmd: "niri msg action maximize-column" }
      - { key: "2", desc: Half width,   cmd: "niri msg action set-column-width \"50%\"" }
      - { key: "3", desc: Third width,  cmd: "niri msg action set-column-width \"33%\"" }
      - { key: "f", desc: Fullscreen,   cmd: "niri msg action fullscreen-window" }
      - { key: "h", desc: Width -10%,   cmd: "niri msg action set-column-width \"-10%\"",  keep_open: true }
      - { key: "l", desc: Width +10%,   cmd: "niri msg action set-column-width \"+10%\"",  keep_open: true }
      - { key: "j", desc: Height -10%,  cmd: "niri msg action set-window-height \"-10%\"", keep_open: true }
      - { key: "k", desc: Height +10%,  cmd: "niri msg action set-window-height \"+10%\"", keep_open: true }

  # Marks
  - key: "M"
    desc: Set mark
    submenu:
      - { key: "a", desc: Mark a, cmd: "niri-mark-set.sh a" }
      - { key: "b", desc: Mark b, cmd: "niri-mark-set.sh b" }
  - key: "`"
    desc: Jump to mark
    submenu:
      - { key: "a", desc: Jump a, cmd: "niri-mark-jump.sh a" }
      - { key: "b", desc: Jump b, cmd: "niri-mark-jump.sh b" }

  # Misc
  - { key: "t",   desc: Terminal,        cmd: "kitty" }
  - { key: "F11", desc: Toggle floating, cmd: "niri msg action toggle-window-floating" }
  - { key: "b", desc: Back,            cmd: "niri msg action focus-window-previous", keep_open: true }
  - { key: "o", desc: Overview,        cmd: "niri msg action toggle-overview" }
  - { key: "q", desc: Close,           cmd: "niri msg action close-window" }
  - { key: "'", desc: Exit,            cmd: "true" }
